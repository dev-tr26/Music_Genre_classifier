<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarmoniAI — Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#08080f; --surface:#0f0f1a;
    --border:rgba(255,255,255,0.07);
    --accent:#c8f564; --accent2:#7c6ff7;
    --text:#e8e8f0; --muted:#6b6b80;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Syne',sans-serif;min-height:100vh;
    display:flex;flex-direction:column;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;opacity:.6;
  }
  .blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
  .blob-1{width:500px;height:500px;background:rgba(200,245,100,0.09);top:-150px;right:-150px;}
  .blob-2{width:400px;height:400px;background:rgba(124,111,247,0.1);bottom:-100px;left:-100px;}

  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 48px;
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    background:rgba(8,8,15,0.7);
  }
  .logo{font-size:1.1rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);}
  .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  main{
    position:relative;z-index:1;flex:1;
    display:flex;flex-direction:column;align-items:center;
    padding:120px 24px 80px;gap:40px;
  }


  .genre-hero{
    text-align:center;
    animation:fadeUp .6s ease both;
  }
  .genre-label{
    font-family:'DM Mono',monospace;font-size:.7rem;
    color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;
  }
  .genre-emoji{font-size:5rem;line-height:1;margin-bottom:16px;display:block;}
  .genre-name{
    font-size:clamp(3rem,10vw,8rem);font-weight:800;
    letter-spacing:-.05em;line-height:.9;
    background:linear-gradient(135deg,var(--accent) 0%,#9efb9e 40%,var(--accent2) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    text-transform:uppercase;
  }
  .confidence-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(200,245,100,.08);border:1px solid rgba(200,245,100,.2);
    padding:8px 20px;margin-top:20px;
    font-family:'DM Mono',monospace;font-size:.85rem;color:var(--accent);
  }
  .confidence-badge strong{font-size:1.1rem;}

  .chart-card{
    width:100%;max-width:640px;
    background:var(--surface);border:1px solid var(--border);
    padding:32px;
    animation:fadeUp .6s .15s ease both;
  }
  .chart-title{font-size:.8rem;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;}

  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .bar-row:last-child{margin-bottom:0;}
  .bar-genre{
    width:90px;font-size:.82rem;font-weight:700;text-align:right;
    flex-shrink:0;text-transform:capitalize;
  }
  .bar-genre.winner{color:var(--accent);}
  .bar-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;position:relative;}
  .bar-fill{
    height:100%;border-radius:3px;width:0;
    transition:width 1s cubic-bezier(.16,1,.3,1);
  }
  .bar-fill.winner{background:linear-gradient(90deg,var(--accent2),var(--accent));}
  .bar-fill.other{background:rgba(255,255,255,.2);}
  .bar-pct{width:46px;font-size:.78rem;font-family:'DM Mono',monospace;color:var(--muted);flex-shrink:0;}
  .bar-pct.winner{color:var(--accent);}

 
  .actions{
    display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    animation:fadeUp .6s .3s ease both;
  }
  .btn-primary{
    background:var(--accent);color:#08080f;
    border:none;padding:14px 32px;
    font-family:'Syne',sans-serif;font-weight:800;font-size:.95rem;
    cursor:pointer;letter-spacing:-.01em;
    clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
    text-decoration:none;display:inline-flex;align-items:center;gap:8px;
    transition:opacity .2s,transform .2s;
  }
  .btn-primary:hover{opacity:.88;transform:translateY(-1px);}
  .btn-outline{
    background:transparent;color:var(--muted);
    border:1px solid var(--border);padding:14px 24px;
    font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;
    cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;
    transition:all .2s;
  }
  .btn-outline:hover{border-color:var(--accent2);color:var(--text);}

  footer{
    position:relative;z-index:1;
    border-top:1px solid var(--border);
    padding:24px 48px;
    display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:.75rem;font-family:'DM Mono',monospace;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:600px){nav{padding:16px 20px;}main{padding:90px 16px 60px;}.chart-card{padding:24px;}footer{flex-direction:column;gap:8px;text-align:center;}}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<nav>
  <a href="/" class="logo"><div class="logo-dot"></div>HarmoniAI</a>
  <a href="/upload" class="btn-outline" style="font-size:.8rem;padding:10px 20px;">← Try Another</a>
</nav>

<main>
  <div class="genre-hero">
    <div class="genre-label">Predicted Genre</div>
    <span class="genre-emoji" id="genreEmoji">🎵</span>
    <div class="genre-name" id="genreName">—</div>
    <div class="confidence-badge">Top confidence: <strong id="topConf">—</strong></div>
  </div>

  <div class="chart-card">
    <div class="chart-title">Confidence across all genres</div>
    <div id="barsContainer"></div>
  </div>

  <div class="actions">
    <a href="/upload" class="btn-primary">✦ Classify Another</a>
    <a href="/" class="btn-outline">Home</a>
  </div>
</main>

<footer>
  <span>HarmoniAI — results are probabilistic estimates</span>
  <span>Audio deleted after inference</span>
</footer>

<script>
const GENRE_EMOJIS = {
  blues:'🎸',classical:'🎻',country:'🤠',disco:'🕺',
  hiphop:'🎤',jazz:'🎷',metal:'🤘',pop:'🎵',reggae:'🌴',rock:'🔥'
};

function init() {
  const raw = sessionStorage.getItem('harmoni_result');
  if (!raw) { window.location.href = '/upload'; return; }

  const data = JSON.parse(raw);
  sessionStorage.removeItem('harmoni_result'); // consume once

  const genre = (data.predicted_genre || '').toLowerCase();
  const confidence = data.confidence || {};

  document.getElementById('genreName').textContent = genre;
  document.getElementById('genreEmoji').textContent = GENRE_EMOJIS[genre] || '🎵';

  const topPct = confidence[genre] || 0;
  document.getElementById('topConf').textContent = topPct.toFixed(1) + '%';

  const container = document.getElementById('barsContainer');
  const sorted = Object.entries(confidence).sort((a,b) => b[1]-a[1]);

  sorted.forEach(([g, pct], i) => {
    const isWinner = g === genre;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-genre ${isWinner?'winner':''}">${g}</div>
      <div class="bar-track">
        <div class="bar-fill ${isWinner?'winner':'other'}" data-pct="${pct}" style="width:0%"></div>
      </div>
      <div class="bar-pct ${isWinner?'winner':''}">${pct.toFixed(1)}%</div>
    `;
    container.appendChild(row);
  });


  requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach((el, i) => {
      setTimeout(() => {
        el.style.width = el.dataset.pct + '%';
      }, i * 80);
    });
  });
}

init();
</script>
</body>
</html>
